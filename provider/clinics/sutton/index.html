<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sutton Clinics in London</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }
        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        h1 { font-size: 28px; margin-bottom: 10px; }
        .subtitle { color: #666; margin-bottom: 30px; }
        .provider-list { display: grid; gap: 12px; }
        .provider-card { background: white; padding: 20px; border-radius: 8px; border-left: 4px solid #0066cc; }
        .provider-name { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
        .provider-detail { color: #666; font-size: 13px; margin-bottom: 4px; }
        .provider-id { color: #999; font-size: 12px; font-family: monospace; margin-top: 8px; padding-top: 8px; border-top: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏥 Clinics in Sutton</h1>
        <p class="subtitle">3 providers</p>
        
        <div class="provider-list">
            <div class="provider-card">
                <div class="provider-name">Clinic (SM1 1DA)</div>
                <div class="provider-detail"><strong>Type:</strong> Clinic</div>
                <div class="provider-detail"><strong>Postcode:</strong> SM1 1DA</div>
                <div class='provider-detail'><strong>Status:</strong> Deregistered</div>
                <div class="provider-id">ID: 1-119400769</div>
            </div>
            <div class="provider-card">
                <div class="provider-name">Clinic (SM1 1DA)</div>
                <div class="provider-detail"><strong>Type:</strong> Clinic</div>
                <div class="provider-detail"><strong>Postcode:</strong> SM1 1DA</div>
                <div class='provider-detail'><strong>Status:</strong> Registered</div>
                <div class="provider-id">ID: 1-9959036855</div>
            </div>
            <div class="provider-card">
                <div class="provider-name">Clinic (SM2 5NF)</div>
                <div class="provider-detail"><strong>Type:</strong> Clinic</div>
                <div class="provider-detail"><strong>Postcode:</strong> SM2 5NF</div>
                <div class='provider-detail'><strong>Status:</strong> Deregistered</div>
                <div class="provider-id">ID: 1-125651207</div>
            </div>
        </div>
    </div>
</body>
</html>
