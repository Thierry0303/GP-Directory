name: Rebuild gps.json from ePraccur

# One-click rebuild of gps.json from NHS Digital's authoritative ePraccur file.
# This is a manual workflow — run it from the Actions tab whenever you want
# to refresh the master GP list (closures, openings, postcode coverage).
#
# After this runs successfully:
#   1. gps.json is committed with all active London GPs (Inner + Outer)
#   2. The next scheduled NHS refresh will rebuild merged.json on top of it
#   3. Twickenham, Brentford, Kingston, Bromley, etc. will all show up

on:
  workflow_dispatch:
    inputs:
      skip_cqc:
        description: "Skip CQC enrichment (much faster, no ratings)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      limit:
        description: "Limit to N practices (for testing). 0 = no limit."
        required: false
        default: "0"

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Backup current gps.json
        run: cp gps.json gps.json.bak || true

      - name: Run rebuild
        env:
          CQC_KEY: ${{ secrets.CQC_KEY }}
        run: |
          ARGS=""
          if [ "${{ inputs.skip_cqc }}" = "true" ]; then ARGS="$ARGS --no-cqc"; fi
          if [ "${{ inputs.limit }}" != "0" ]; then ARGS="$ARGS --limit ${{ inputs.limit }}"; fi
          echo "Running: python rebuild_gps_json.py $ARGS"
          python rebuild_gps_json.py $ARGS

      - name: Show postcode coverage summary
        run: |
          python - <<'PY'
          import json, collections, re
          d = json.load(open("gps.json"))
          by_area = collections.Counter()
          for r in d:
              pc = (r.get("postcode") or "").strip().upper()
              m = re.match(r"^([A-Z]+)", pc)
              if m: by_area[m.group(1)] += 1
          print(f"Total practices: {len(d)}")
          print("By postcode area:")
          for a, n in sorted(by_area.items(), key=lambda x: -x[1]):
              flag = "  <-- TW (Twickenham/Richmond)" if a == "TW" else ""
              print(f"  {a:4s} {n}{flag}")
          PY

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gps.json
          if git diff --cached --quiet; then
            echo "No changes to gps.json"
          else
            git commit -m "chore: rebuild gps.json from ePraccur ($(date -u +%Y-%m-%d))"
            git push
          fi
