name: Weekly NHS Data Refresh
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas numpy pyyaml
      
      - name: Fetch NHS ODS data
        run: python refresh_nhs_data.py
      
      - name: Build borough hub pages
        run: python build_borough_pages.py
      
      - name: Build per-practice pages
        run: python build_practice_pages.py
      
      - name: Fetch private clinics from CQC
        env:
          CQC_KEY: ${{ secrets.CQC_KEY }}
        run: python fetch_private_clinics.py
      
      - name: Scan CQC for healthcare providers
        env:
          CQC_KEY: ${{ secrets.CQC_KEY }}
        run: python cqc_scanner_optimized.py
      
      - name: Process CQC data into categories
        run: python process_cqc_data_v2.py
      
      - name: Build healthcare provider pages
        run: python build_healthcare_pages_fixed_v2.py
      
      - name: Pull latest changes before commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || git rebase --abort
      
      - name: Commit and push changes
        run: |
          git add index.html practice/ provider/ sitemap.xml merged.json private_clinics.json dentists.json clinics.json hospitals.json specialties_breakdown.json cqc_london_providers.json
          git diff --staged --quiet || git commit -m "chore: refresh NHS ODS + CQC healthcare data $(date -u '+%Y-%m-%d')"
          git push origin main
