def geocode(postcode):
    if not postcode: return None, None
    pc = postcode.strip().upper().replace(" ","")
    m = re.match(r'^([A-Z]{1,2}\d{1,2}[A-Z]?)', pc)
    if not m: return None, None
    d = m.group(1)
    if d in PC_CENTROIDS: return PC_CENTROIDS[d]
    s = re.match(r'^([A-Z]{1,2}\d)', pc)
    if s and s.group(1) in PC_CENTROIDS: return PC_CENTROIDS[s.group(1)]
    return None, None

def get_area(postcode):
    if not postcode: return ""
    pc = postcode.strip().upper().replace(" ","")
    m = re.match(r'^([A-Z]{1,2}\d{1,2}[A-Z]?)', pc)
    if not m: return ""
    d = m.group(1)
    if d in AREA_MAP: return AREA_MAP[d]
    s = re.match(r'^([A-Z]{1,2}\d)', pc)
    if s and s.group(1) in AREA_MAP: return AREA_MAP[s.group(1)]
    return d

def title_case(s):
    if not s or not s.isupper(): return s
    exc = {"and","or","of","the","at","in","for","a","an","to","by"}
    words = s.lower().split()
    return " ".join(w if (i>0 and w in exc) else w.capitalize()
                    for i,w in enumerate(words))

def fetch_one(ods):
    url = (f"{NHS_FHIR_BASE}?identifier="
           f"https%3A%2F%2Ffhir.nhs.uk%2FId%2Fods-organization-code%7C{ods}"
           f"&_format=json")
    for attempt in range(MAX_RETRIES+1):
        try:
            req = urllib.request.Request(url, headers={"Accept":"application/json"})
            with urllib.request.urlopen(req, timeout=TIMEOUT) as r:
                data = json.loads(r.read())
                entries = data.get("entry",[])
                if not entries: return ods, None
                res = entries[0].get("resource",{})
                name    = title_case(res.get("name",""))
                active  = res.get("active", True)
                tc      = res.get("telecom",[])
                phone   = next((t.get("value","") for t in tc if t.get("system")=="phone"),"")
                addrs   = res.get("address",[])
                addr    = addrs[0] if addrs else {}
                postcode= addr.get("postalCode","").strip()
                lines   = addr.get("line",[])
                city    = addr.get("city","")
                address = title_case(", ".join(filter(None, lines+([city] if city else []))))
                return ods, {"name":name,"phone":phone,"address":address,
                             "postcode":postcode,"active":active}
        except urllib.error.HTTPError as e:
            if e.code==404: return ods, None
            if attempt==MAX_RETRIES: return ods, None
        except Exception:
            if attempt==MAX_RETRIES: return ods, None
    return ods, None

# ── Concurrent fetch ──────────────────────────────────────────────────────────
print(f"Fetching {len(ods_codes)} practices ({MAX_WORKERS} concurrent)...")
nhs_data = {}
done = success = failed = 0

with ThreadPoolExecutor(max_workers=MAX_WORKERS) as ex:
    futures = {ex.submit(fetch_one, ods): ods for ods in ods_codes}
    for future in as_completed(futures):
        ods, result = future.result()
        done += 1
        if result:
            nhs_data[ods] = result
            success += 1
        else:
            failed += 1
        if done % 100 == 0 or done == len(ods_codes):
            print(f"  {done}/{len(ods_codes)} done — {success} ok, {failed} failed")

print(f"\nFetch done: {success} ok, {failed} failed")

# ── Merge ─────────────────────────────────────────────────────────────────────
print("Merging data...")
static_by_ods = {}
for d in BASE_DATA:
    ods = d.get("ods_code","")
    pcn = (d.get("gpps_pcn","") or "").replace(" PCN","").replace(" Pcn","").strip()
    static_by_ods[ods] = {
        "score":   d.get("gpps_overall_pct"),
        "contact": d.get("gpps_contact_pct"),
        "pcn":     pcn,
        "cqc":     d.get("cqc_rating",""),
        "cqc_url": d.get("cqc_url",""),
    }

merged = []
inactive = 0
for ods in ods_codes:
    live   = nhs_data.get(ods,{})
    static = static_by_ods.get(ods,{})
    base   = base_by_ods.get(ods,{})
    if live and not live.get("active",True):
        inactive += 1
        continue
    name     = live.get("name")     or title_case(base.get("name",""))
    phone    = live.get("phone")    or base.get("phone","") or ""
    address  = live.get("address")  or title_case(base.get("address",""))
    postcode = live.get("postcode") or base.get("postcode","") or ""
    lat, lng = geocode(postcode)
    area     = get_area(postcode)
    merged.append({
        "o":ods,"n":name,"a":address,"p":postcode,"ph":phone,
        "s":static.get("score"),"c":static.get("contact"),
        "pcn":static.get("pcn",""),"cqc":static.get("cqc",""),
        "cu":static.get("cqc_url",""),"ar":area,
        "la":round(lat,5) if lat else None,
        "ln":round(lng,5) if lng else None,
    })

print(f"  {len(merged)} active, {inactive} inactive skipped")

# ── Rebuild index.html ────────────────────────────────────────────────────────
print("Rebuilding index.html...")
DATA_JS = json.dumps(merged, separators=(",",":"))
updated_date = datetime.utcnow().strftime("%-d %B %Y")

with open("index.template.html") as f:
    template = f.read()

html = (template
    .replace("__DATA_PLACEHOLDER__", DATA_JS)
    .replace("__UPDATED_DATE__", updated_date)
    .replace("__PRACTICE_COUNT__", str(len(merged))))

with open("index.html","w") as f:
    f.write(html)

print(f"  index.html written ({len(html)//1024} KB)")
print(f"  {len(merged)} practices, updated {updated_date}")
print("Done!")
