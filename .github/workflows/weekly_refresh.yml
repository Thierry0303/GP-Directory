name: Weekly ODS Refresh

# Lightweight refresh: just the ODS register and "accepting new patients" flag.
# Catches practice closures, mergers, and the most-searched live attribute.
on:
  schedule:
    # 06:00 UTC every Monday
    - cron: '0 6 * * 1'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas numpy pyyaml

      - name: Refresh ODS data only
        env:
          NHS_ODS_API_KEY: ${{ secrets.NHS_ODS_API_KEY }}
        run: python3 scripts/refresh_nhs_data.py --ods-only

      - name: Rebuild practice pages and hubs
        run: |
          python3 scripts/build_gp_pages.py
          python3 scripts/build_gp_borough_hubs.py
          python3 scripts/build_sitemap.py

      - name: Commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Weekly ODS refresh: $(date -u +'%Y-%m-%d')"
            git push
          fi
