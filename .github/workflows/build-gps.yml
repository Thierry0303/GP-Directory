name: Build gps.json (CQC + FHIR)

# Builds gps.json using ONLY the two endpoints proven to work from CI:
# CQC pagination (used by fetch_private_clinics.py) and FHIR identifier
# lookup (used by refresh_nhs_data.py). Manual trigger only.

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run build
        env:
          CQC_KEY: ${{ secrets.CQC_KEY }}
        run: python build_gps_final.py

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gps.json
          if git diff --cached --quiet; then
            echo "No changes to gps.json"
          else
            git commit -m "build: regenerate gps.json via CQC+FHIR ($(date -u +%Y-%m-%d))"
            git push
          fi
