name: Expand gps.json via CQC

# Adds outer-London GP practices to gps.json by discovering ODS codes via the
# CQC API (which works from GitHub Actions, unlike NHS Digital's CDN) and then
# looking up each code via the FHIR identifier endpoint.
#
# Run this AFTER you've restored gps.json from git history. The script refuses
# to run if gps.json is empty.

on:
  workflow_dispatch:

jobs:
  expand:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sanity check — gps.json must not be empty
        run: |
          python - <<'PY'
          import json, sys
          d = json.load(open("gps.json"))
          if not isinstance(d, list) or len(d) < 100:
              print(f"ABORT: gps.json has {len(d) if isinstance(d, list) else 'invalid'} records.")
              print("Restore it from git history before running this workflow.")
              sys.exit(1)
          print(f"OK: gps.json has {len(d)} records")
          PY

      - name: Run expand
        env:
          CQC_KEY: ${{ secrets.CQC_KEY }}
        run: python expand_gps_via_cqc.py

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gps.json
          if git diff --cached --quiet; then
            echo "No changes to gps.json"
          else
            git commit -m "chore: expand gps.json with outer-London GPs via CQC ($(date -u +%Y-%m-%d))"
            git push
          fi
