name: Full refresh (NHS + Private + Merge)
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests pandas numpy pyyaml
      - name: Fetch private clinics
        env:
          CQC_KEY: ${{ secrets.CQC_KEY }}
        run: python fetch_private_clinics.py
      - name: NHS refresh
        run: python refresh_nhs_data.py
      - name: Strip non-GP NHS records
        run: python clean_nhs_records.py
      - name: Merge private + rebuild index.html
        run: python merge_into_dataset.py
      - name: Normalize website URLs (add https://)
        run: python normalize_urls.py
      - name: Backfill missing CQC ratings (paginate + detail)
        env:
          CQC_KEY: ${{ secrets.CQC_KEY }}
        run: python enrich_cqc_ratings.py
      - name: Drop non-GMS NHS records (no CQC after enrichment)
        run: python drop_non_gms.py
      - name: Fix borough assignments via ONS postcode data
        run: python fix_boroughs.py
      - name: Build borough pages
        run: python build_borough_pages.py
      - name: Build practice pages
        run: python build_practice_pages.py
      - name: Build specialty hub pages
        run: python build_specialty_pages.py
      - name: Scan CQC for healthcare providers
        env:
          CQC_KEY: ${{ secrets.CQC_KEY }}
        run: python cqc_scanner_fixed_v2.py
      - name: Process CQC data into categories
        run: python process_cqc_data_v2.py
      - name: Build healthcare provider pages
        run: python build_healthcare_pages_fixed_v2.py
      - name: Build borough index page
        run: python build_borough_index.py
      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add -A
          
          if git diff --cached --quiet; then
            echo "No changes detected to commit."
          else
            git commit -m "Full refresh: NHS + Private + CQC healthcare data ($(date -u +%Y-%m-%d))"
            
            # 🟢 Defensive Rebase & Retry Loop
            # Runs up to 3 times to reconcile mid-run changes to the remote main branch
            for i in {1..3}; do
              echo "Attempting synchronization and push (Attempt $i)..."
              
              # Fetch remote history and replay your generated pages cleanly on top
              git pull --rebase origin main
              
              # Try pushing the reconciled stack upstream
              if git push origin main; then
                echo "✅ Successfully synchronized and pushed directory changes!"
                exit 0
              fi
              
              echo "⚠️ Push collided with a concurrent commit. Backing off for 5 seconds..."
              sleep 5
            done
            
            echo "❌ Failed to push changes after 3 synchronized attempts."
            exit 1
          fi
