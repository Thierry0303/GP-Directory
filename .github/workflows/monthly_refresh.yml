name: Monthly Data Refresh

on:
  schedule:
    # 08:00 UTC on the 15th of every month
    - cron: '0 8 15 * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas numpy pyyaml

      - name: Fetch fresh NHS data
        env:
          NHS_ODS_API_KEY: ${{ secrets.NHS_ODS_API_KEY }}
        run: python3 scripts/refresh_nhs_data.py

      - name: Build per-practice pages
        run: python3 scripts/build_gp_pages.py

      - name: Build borough and PCN hubs
        run: python3 scripts/build_gp_borough_hubs.py

      - name: Rebuild sitemap
        run: python3 scripts/build_sitemap.py

      - name: Commit refreshed site
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Monthly data refresh: $(date -u +'%Y-%m-%d')"
            git push
          fi
