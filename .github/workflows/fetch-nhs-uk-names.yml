name: Fetch NHS.uk colloquial names

# Replaces NHS contract names (often the doctor's name) with the colloquial
# name from each practice's NHS.uk profile page. Run after gps.json is
# cleaned up; the original name is preserved as `official_name`.

on:
  workflow_dispatch:

jobs:
  fetch-names:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run fetcher
        run: python fetch_nhs_uk_names.py

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gps.json
          if git diff --cached --quiet; then
            echo "No changes to gps.json"
          else
            git commit -m "rename: pull colloquial names from NHS.uk ($(date -u +%Y-%m-%d))"
            git push
          fi
